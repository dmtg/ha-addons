name: "wizarr"
description: "wizarr integration for Home Assistant"
url: https://github.com/dmtg/ha-addons/blob/main/wizarr/README.md
webui: http://[HOST]:[PORT:5690]
version: "2026.2.1.7"
slug: "wizarr_addon"
init: true
host_network: true
arch:
  - aarch64
  - amd64
  - armhf
  - armv7
  - i386
ports:
  5690/tcp: 5690
map:
  - share:rw
environment:
      TZ: Europe/Lisbon
privileged:
  - SYS_ADMIN
# Opções configuráveis no UI do Home Assistant
options:
  PUID: 1000
  PGID: 1000
  TZ: Europe/Lisbon
  LOG_LEVEL: info

schema:
  PUID: int
  PGID: int
  TZ: str
  LOG_LEVEL: list(trace|debug|info|warning|error)
