name: "wizarr"
description: "wizarr integration for Home Assistant"
url: https://github.com/dmtg/ha-addons/blob/main/wizarr/README.md
webui: http://[HOST]:[PORT:5690]
version: "2026.2.1.0"
slug: "wizarr_addon"
init: false
arch:
  - aarch64
  - amd64
  - armhf
  - armv7
  - i386
ports:
  5690/tcp: 5690
map:
  - share:rw
volumes:      
  /share/wizarr/configs:/data # Make sure your local config directory exists
environment:
      TZ: Europe/Lisbon
      PUID=1000 #Set UID
      PGID=1000 #Set GID
