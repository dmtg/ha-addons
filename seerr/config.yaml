name: "Seerr"
description: "Seerr integration for Home Assistant"
url: https://seerr.dev/
webui: http://[HOST]:[PORT:5055]
version: "3.2.0"
slug: "seerr_addon"
init: false
arch:
  - aarch64
  - amd64
  - armhf
  - armv7
  - i386
ports:
  5055/tcp: 5055
map:
  - share:rw
volumes:      
  - /share/seerr/configs:/app/config # Make sure your local config directory exists
environment:
      TZ: Europe/Lisbon
