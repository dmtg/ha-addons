name: "Seerr"
description: "Open-source media request and discovery manager for Jellyfin, Plex, and Emby."
version: "3.2.0.3"
slug: "seerr_addon"
init: false

arch:
  - aarch64
  - amd64
  - armv7
  - armhf
  - i386

ports:
  5055/tcp: 5055

webui: "http://[HOST]:[PORT:5055]"
url: "https://seerr.dev/"

startup: services
boot: auto
options:
  TZ: "Europe/Lisbon"

schema:
  TZ: str
