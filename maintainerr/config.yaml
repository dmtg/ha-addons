name: "Mantainerr"
description: "Maintainerr integration for Home Assistant"
url: https://github.com/dmtg/ha-addons/blob/main/mantainerr/README.md
webui: http://[HOST]:[PORT:6246]
version: "3.3.0.1"
slug: "maintainerr_addon"
init: true
host_network: true
arch:
  - aarch64
  - amd64
  - armhf
  - armv7
  - i386
ports:
  6246/tcp: 6246
map:
  - share:rw
environment:
      TZ: Europe/Lisbon
privileged:
  - SYS_ADMIN
# Opções configuráveis no UI do Home Assistant
options:
  PUID: 1000
  PGID: 1000
  TZ: Europe/Lisbon
  LOG_LEVEL: info

schema:
  PUID: int
  PGID: int
  TZ: str
  LOG_LEVEL: list(trace|debug|info|warning|error)
volumes:      
  /share/maintainerr:/opt/data # Make sure your local config directory exists
